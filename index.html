<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #fff; overflow: hidden; }
        canvas { cursor: crosshair; border: 1px solid #000; margin-top: 10px; }
        #preview { width: 40px; height: 40px; margin: 5px; border: 1px solid #000; }
    </style>
</head>
<body>
    <div id="preview"></div>
    <canvas id="picker" width="250" height="250"></canvas>

    <script>
        // Pega a URL do script LSL que passamos via "?cap="
        const urlParams = new URLSearchParams(window.location.search);
        const lslCap = urlParams.get('cap');

        const canvas = document.getElementById('picker');
        const ctx = canvas.getContext('2d');
        const preview = document.getElementById('preview');

        // Desenha o degradê colorido
        let grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
        ["red", "orange", "yellow", "green", "cyan", "blue", "magenta", "red"].forEach((color, i, arr) => {
            grad.addColorStop(i / (arr.length - 1), color);
        });
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Desenha o degradê de brilho/preto
        let vGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        vGrad.addColorStop(0, "rgba(255,255,255,1)");
        vGrad.addColorStop(0.5, "rgba(255,255,255,0)");
        vGrad.addColorStop(0.5, "rgba(0,0,0,0)");
        vGrad.addColorStop(1, "rgba(0,0,0,1)");
        ctx.fillStyle = vGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const data = ctx.getImageData(x, y, 1, 1).data;
            const rgb = `${data[0]},${data[1]},${data[2]}`;
            
            preview.style.backgroundColor = `rgb(${rgb})`;

            // ENVIA PARA O SECOND LIFE
            if (lslCap) {
                fetch(lslCap, { method: 'POST', body: rgb });
            }
        });
    </script>
</body>
</html>
