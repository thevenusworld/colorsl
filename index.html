<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; overflow: hidden; }
        canvas { border: 2px solid #fff; cursor: crosshair; }
    </style>
</head>
<body>
    <canvas id="picker" width="300" height="300"></canvas>

    <script>
        const canvas = document.getElementById('picker');
        const ctx = canvas.getContext('2d');

        // Desenha o degradê (estilo a sua imagem)
        let g = ctx.createLinearGradient(0, 0, canvas.width, 0);
        g.addColorStop(0, "red"); g.addColorStop(0.15, "yellow"); g.addColorStop(0.3, "green");
        g.addColorStop(0.5, "cyan"); g.addColorStop(0.65, "blue"); g.addColorStop(0.8, "magenta"); g.addColorStop(1, "red");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let v = ctx.createLinearGradient(0, 0, 0, canvas.height);
        v.addColorStop(0, "white"); v.addColorStop(0.5, "transparent"); v.addColorStop(1, "black");
        ctx.fillStyle = v;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Função que envia a cor para o SL
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const d = ctx.getImageData(x, y, 1, 1).data;
            const rgb = `${d[0]},${d[1]},${d[2]}`;

            // ESTE É O COMANDO QUE FALA COM O SCRIPT LSL
            if (window.mylsl && window.mylsl.call) {
                window.mylsl.call('mudar', rgb);
            }
        });
    </script>
</body>
</html>
