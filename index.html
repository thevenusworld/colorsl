<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #eee; font-family: sans-serif; overflow: hidden; }
        canvas { cursor: crosshair; margin-top: 10px; border: 2px solid #ccc; }
        .preview { width: 50px; height: 50px; border: 2px solid #000; margin: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="preview" id="colorPreview"></div>
    <canvas id="colorCanvas" width="250" height="250"></canvas>

    <script>
        const canvas = document.getElementById('colorCanvas');
        const ctx = canvas.getContext('2d');
        const preview = document.getElementById('colorPreview');

        // Cria o degradê colorido (estilo a sua imagem)
        let gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        gradient.addColorStop(0, "red");
        gradient.addColorStop(0.17, "orange");
        gradient.addColorStop(0.33, "yellow");
        gradient.addColorStop(0.5, "green");
        gradient.addColorStop(0.67, "cyan");
        gradient.addColorStop(0.83, "blue");
        gradient.addColorStop(1, "magenta");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Adiciona o degradê de branco/preto (vertical)
        let whiteGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        whiteGrad.addColorStop(0, "rgba(255,255,255,1)");
        whiteGrad.addColorStop(0.5, "rgba(255,255,255,0)");
        whiteGrad.addColorStop(0.5, "rgba(0,0,0,0)");
        whiteGrad.addColorStop(1, "rgba(0,0,0,1)");
        ctx.fillStyle = whiteGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        function pickColor(event) {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            const imgData = ctx.getImageData(x, y, 1, 1).data;
            
            const r = imgData[0];
            const g = imgData[1];
            const b = imgData[2];
            
            preview.style.backgroundColor = `rgb(${r},${g},${b})`;
            
            const rgbString = `${r},${g},${b}`;

            // Envia para o LSL
            if (window.mylsl) {
                window.mylsl.call('mudar_cor', rgbString);
            }
        }

        // Envia a cor apenas quando soltar o clique (evita lag)
        canvas.addEventListener('mouseup', pickColor);
    </script>
</body>
</html>
