<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #picker { width: 90vw; height: 90vw; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <input type="color" id="picker" value="#ffffff">

    <script>
        const picker = document.getElementById('picker');
        
        // Quando o usuário mudar a cor no seletor
        picker.addEventListener('input', (event) => {
            const hex = event.target.value;
            // Converte HEX para RGB para o LSL entender fácil
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            
            const rgbString = `${r},${g},${b}`;

            // COMANDO MÁGICO: Envia os dados para o script LSL no HUD
            if (window.mylsl) {
                window.mylsl.call('mudar_cor', rgbString);
            }
        });
    </script>
</body>
</html>
